<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>世界杯赛程日历</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">2026 FIFA World Cup · 世界杯</p>
          <h1>世界杯赛程日历 / Match Calendar</h1>
        </div>
        <div class="actions">
          <button id="todayButton" type="button" title="跳到今天 / Jump to today">今天 / Today</button>
          <button id="refreshButton" type="button" title="立即更新比分 / Refresh scores">更新 / Refresh</button>
        </div>
      </header>

      <section class="controls" aria-label="筛选">
        <label class="search">
          <span>搜索 / Search</span>
          <input id="searchInput" type="search" placeholder="球队、城市、场馆 / team, city, venue" />
        </label>
        <label>
          <span>状态 / Status</span>
          <select id="statusFilter">
            <option value="all">全部 / All</option>
            <option value="pre">未开始 / Scheduled</option>
            <option value="in">进行中 / Live</option>
            <option value="post">已结束 / Finished</option>
          </select>
        </label>
      </section>

      <section class="summary" aria-live="polite">
        <div>
          <strong id="matchCount">--</strong>
          <span>场比赛 / Matches</span>
        </div>
        <div>
          <strong id="nextMatch">--</strong>
          <span>下一场 / Next</span>
        </div>
        <div>
          <strong id="updatedAt">--</strong>
          <span>最后更新 / Updated</span>
        </div>
      </section>

      <div class="layout">
        <section id="calendar" class="calendar" aria-live="polite"></section>
        <aside class="standings" aria-label="小组积分榜 / Group standings">
          <div class="standings-head">
            <h2>小组积分 / Standings</h2>
            <span>FIFA 排序 / FIFA order</span>
          </div>
          <div id="standingsList" class="standings-list"></div>
        </aside>
      </div>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
